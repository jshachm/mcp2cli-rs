name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64 (musl for static linking)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            binary_name: mcp2cli-rs
          
          # Linux aarch64 (ARM64)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            binary_name: mcp2cli-rs
          
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            binary_name: mcp2cli-rs
          
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            binary_name: mcp2cli-rs
          
          # Windows x86_64
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            use_cross: false
            binary_name: mcp2cli-rs.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross
      if: matrix.use_cross
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Build
      run: |
        if [ "${{ matrix.use_cross }}" = "true" ]; then
          cross build --release --target ${{ matrix.target }}
        else
          cargo build --release --target ${{ matrix.target }}
        fi
      shell: bash

    - name: Package
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
        cp README.md dist/
        cp README.zh-CN.md dist/ 2>/dev/null || true
        cp LICENSE dist/ 2>/dev/null || true
        cd dist
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          7z a ../mcp2cli-rs-${{ matrix.target }}.zip *
        else
          tar czvf ../mcp2cli-rs-${{ matrix.target }}.tar.gz *
        fi
        cd ..
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcp2cli-rs-${{ matrix.target }}
        path: |
          mcp2cli-rs-*.tar.gz
          mcp2cli-rs-*.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
